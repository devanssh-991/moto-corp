<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>motocorp</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove Devansh 123, Bipul 456, Shivansh 789, and John Doe 789 from the vehicles database
      document.addEventListener('DOMContentLoaded', function() {
        const featuredVehiclesBox = document.querySelector('#featured-vehicles-box');
        if (featuredVehiclesBox) {
          const devansh123Element = featuredVehiclesBox.querySelector('#Devansh-123');
          if (devansh123Element) {
            devansh123Element.remove();
          }
          const bipul456Element = featuredVehiclesBox.querySelector('#Bipul-456');
          if (bipul456Element) {
            bipul456Element.remove();
          }
          const shivansh789Element = featuredVehiclesBox.querySelector('#Shivansh-789');
          if (shivansh789Element) {
            shivansh789Element.remove();
          }
          const johndoe789Element = featuredVehiclesBox.querySelector('#John-Doe-789');
          if (johndoe789Element) {
            johndoe789Element.remove();
          }
        }
      });
    </script>
  </body>
</html>
